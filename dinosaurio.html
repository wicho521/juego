<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D DINO RUNNER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: 'Orbitron', sans-serif; user-select: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; box-sizing: border-box; }
        .score { font-size: 3rem; font-weight: 900; text-shadow: 0 0 10px #00ffff; }
        #start { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: auto; text-align: center; background: rgba(0,255,255,0.1); border: 2px solid #00ffff; padding: 40px; backdrop-filter: blur(10px); }
        .btn { padding: 15px 40px; background: #00ffff; color: #000; font-weight: 900; cursor: pointer; border: none; text-transform: uppercase; margin-top: 20px; }
        .game-over { display: none; color: #ff00ff; text-shadow: 0 0 20px #ff00ff; font-size: 4rem; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="score" id="score">00000</div>
        <div id="start">
            <h1 id="title">DINO 3D</h1>
            <p id="sub">PRESIONA ESPACIO PARA SALTAR</p>
            <button class="btn" onclick="startGame()">EMPEZAR</button>
            <div class="game-over" id="gameOver">GAME OVER</div>
        </div>
        <div style="font-size: 0.8rem; color: #aaa;">DERECHOS RESERVADOS - ARCADE PORTAL</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let score = 0;
        let isPlaying = false;
        let speed = 0.5;
        let dinoY = 0;
        let dinoVelocity = 0;
        const gravity = -0.015;
        const jumpStrength = 0.35;

        // --- SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020005);
        scene.fog = new THREE.Fog(0x020005, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const amb = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(amb);
        const point = new THREE.PointLight(0x00ffff, 2, 100);
        point.position.set(10, 10, 10);
        scene.add(point);

        // --- DINO (VOXEL) ---
        const dinoGroup = new THREE.Group();
        const dinoBody = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 1.5), new THREE.MeshStandardMaterial({ color: 0x00ff88 }));
        dinoBody.position.y = 0.75;
        dinoGroup.add(dinoBody);
        const dinoHead = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0x00ff88 }));
        dinoHead.position.set(0, 1.5, 0.8);
        dinoGroup.add(dinoHead);
        scene.add(dinoGroup);

        // --- FLOOR ---
        const floorGeo = new THREE.PlaneGeometry(10, 1000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111122 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const grid = new THREE.GridHelper(1000, 100, 0x00ffff, 0x002222);
        grid.rotation.x = -Math.PI / 2;
        floor.add(grid);

        // --- CACTUS ---
        const obstacles = [];
        function spawnObstacle() {
            const h = 1 + Math.random() * 2;
            const geo = new THREE.BoxGeometry(1, h, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff00ff });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, h/2, -50);
            scene.add(mesh);
            obstacles.push(mesh);
        }

        // --- CONTROLS ---
        window.startGame = () => {
            isPlaying = true;
            score = 0;
            speed = 0.5;
            dinoY = 0;
            dinoVelocity = 0;
            obstacles.forEach(o => scene.remove(o));
            obstacles.length = 0;
            document.getElementById('start').style.display = 'none';
        };

        function jump() {
            if (dinoY === 0) {
                dinoVelocity = jumpStrength;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!isPlaying) startGame();
                else jump();
            }
        });

        // --- LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                score++;
                speed += 0.0001;
                document.getElementById('score').innerText = score.toString().padStart(5, '0');

                // Physics
                dinoY += dinoVelocity;
                dinoVelocity += gravity;
                if (dinoY < 0) {
                    dinoY = 0;
                    dinoVelocity = 0;
                }
                dinoGroup.position.y = dinoY;

                // Obstacles
                if (Math.random() < 0.02) spawnObstacle();
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.position.z += speed;

                    // Collision
                    if (Math.abs(obs.position.z - dinoGroup.position.z) < 1 && dinoY < obs.geometry.parameters.height) {
                        endGame();
                    }

                    if (obs.position.z > 10) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function endGame() {
            isPlaying = false;
            document.getElementById('start').style.display = 'block';
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('title').style.display = 'none';
            document.getElementById('sub').innerText = 'PULSA PARA REINTENTAR';
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
