<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Portal - Mis Juegos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body {
            margin: 0; padding: 40px; background-color: #050510; color: white;
            font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center;
        }
        h1 { font-size: 3rem; text-shadow: 0 0 10px #00ffff; margin-bottom: 50px; text-transform: uppercase; text-align: center;}
        .game-list { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; max-width: 1200px; }
        .game-card {
            background: rgba(0,255,255,0.1); border: 2px solid #00ffff; padding: 20px;
            width: 300px; text-decoration: none; color: white; transition: all 0.3s;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
        .game-card:hover { transform: scale(1.05); background: rgba(0,255,255,0.2); box-shadow: 0 0 30px #00ffff; }
        .game-card h2 { margin: 10px 0; color: #00ffff; }
        .game-card p { font-size: 0.9rem; color: #aaa; }
        .game-card .btn {
            margin-top: 20px; padding: 10px 20px; background: #00ffff; color: #000;
            font-weight: 900; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <h1>Arcade Portal</h1>
    <div class="game-list">
        <a href="neon_drift.html" class="game-card">
            <h2>Neon Drift</h2>
            <p>Carreras futuristas de alta velocidad con derrapes y turbo.</p>
            <div class="btn">Jugar Ahora</div>
        </a>
        <a href="tiny_survivors.html" class="game-card">
            <h2>Tiny Survivors</h2>
            <p>Shooter táctico estilo Warzone con estética Voxel contra zombis.</p>
            <div class="btn">Jugar Ahora</div>
        </a>
        <a href="dinosaurio.html" class="game-card">
            <h2>Dinosaurio</h2>
            <p>El clásico juego del dinosaurio recreado en HTML5.</p>
            <div class="btn">Jugar Ahora</div>
        </a>
    </div>
</body>
</html>
