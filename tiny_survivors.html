<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Survivors: TACTICAL DESK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: 'Orbitron', sans-serif; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .stat { background: rgba(0,0,0,0.7); padding: 10px 20px; border-left: 4px solid #00ffff; backdrop-filter: blur(5px); }
        .stat-label { font-size: 0.8rem; color: #00ffff; letter-spacing: 2px; }
        .stat-value { font-size: 2rem; font-weight: 900; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #00ffff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ffff; border-radius: 50%; transform: translate(-50%, -50%); }
        #shop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; background: rgba(5,5,15,0.9); border: 2px solid #00ffff; padding: 30px; display: none; pointer-events: auto; backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(0,255,255,0.3); }
        .shop-title { font-size: 2rem; font-weight: 900; color: #00ffff; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #00ffff; padding-bottom: 10px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.05); margin-bottom: 10px; cursor: pointer; transition: 0.2s; border-right: 4px solid transparent; }
        .shop-item:hover { background: rgba(0,255,255,0.1); border-right: 4px solid #00ffff; }
        .shop-item.locked { opacity: 0.5; cursor: not-allowed; }
        .item-info h3 { margin: 0; font-size: 1.1rem; }
        .item-info p { margin: 0; font-size: 0.8rem; color: #aaa; }
        .item-price { font-weight: 900; color: #00ffff; }
        #msg { position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); text-align: center; font-size: 1.2rem; color: #00ffff; text-shadow: 0 0 10px #00ffff; font-style: italic; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="hud-top">
            <div class="stat">
                <div class="stat-label">MONEDAS</div>
                <div class="stat-value" id="coins">0</div>
            </div>
            <div class="stat" style="text-align: right;">
                <div class="stat-label">OLEADA</div>
                <div class="stat-value" id="wave">1</div>
            </div>
        </div>
        <div class="crosshair"></div>
        <div id="msg">PRESIONA 'B' PARA LA TIENDA</div>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div class="stat">
                <div class="stat-label">ARMA</div>
                <div class="stat-value" id="weaponName">PISTOLA</div>
            </div>
            <div class="stat" style="text-align: right;">
                <div class="stat-label">MUNICIÓN</div>
                <div class="stat-value"><span id="ammo">12</span>/<span id="reserve">∞</span></div>
            </div>
        </div>
    </div>

    <div id="shop">
        <div class="shop-title">BUY STATION</div>
        <div class="shop-item" onclick="buyWeapon('SMG', 50)">
            <div class="item-info"><h3>SMG NEON</h3><p>Alta cadencia, daño moderado</p></div>
            <div class="item-price">$50</div>
        </div>
        <div class="shop-item" onclick="buyWeapon('SHOTGUN', 100)">
            <div class="item-info"><h3>ESCOPETA VULKAN</h3><p>Daño masivo a corta distancia</p></div>
            <div class="item-price">$100</div>
        </div>
        <div class="shop-item" onclick="buyAmmo()">
            <div class="item-info"><h3>MUNICIÓN</h3><p>Recargar reservas</p></div>
            <div class="item-price">$20</div>
        </div>
        <button onclick="toggleShop()" style="width:100%; padding:10px; background:#00ffff; border:none; margin-top:20px; font-family:'Orbitron'; font-weight:900; cursor:pointer;">CERRAR</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- STATE ---
        let coins = 0;
        let wave = 1;
        let health = 100;
        let isPlaying = false;
        let lastShootTime = 0;
        let currentWeapon = 'PISTOL';
        const weapons = {
            PISTOL: { name: 'PISTOLA', ammo: 12, maxAmmo: 12, reserve: Infinity, delay: 300, damage: 25, spread: 0.02 },
            SMG: { name: 'SMG NEON', ammo: 30, maxAmmo: 30, reserve: 120, delay: 100, damage: 15, spread: 0.05 },
            SHOTGUN: { name: 'ESCOPETA', ammo: 5, maxAmmo: 5, reserve: 25, delay: 800, damage: 20, spread: 0.2, multi: 6 }
        };

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.02);

        const camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        composer.addPass(bloom);

        const controls = new PointerLockControls(camera, document.body);
        scene.add(controls.getObject());
        camera.position.set(0, 1.7, 5);

        // --- LIGHTING ---
        const amb = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(amb);
        const sun = new THREE.DirectionalLight(0x00ffff, 1);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        scene.add(sun);

        // --- ENVIRONMENT (GIANT DESK) ---
        const deskGeo = new THREE.BoxGeometry(100, 2, 100);
        const deskMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 });
        const desk = new THREE.Mesh(deskGeo, deskMat);
        desk.position.y = -1;
        desk.receiveShadow = true;
        scene.add(desk);

        const grid = new THREE.GridHelper(100, 50, 0x00ffff, 0x002222);
        grid.position.y = 0.01;
        scene.add(grid);

        // Objects
        function createObject(geo, color, pos, rot = 0) {
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color }));
            mesh.position.copy(pos);
            mesh.rotation.y = rot;
            mesh.castShadow = mesh.receiveShadow = true;
            scene.add(mesh);
        }

        createObject(new THREE.BoxGeometry(20, 1, 10), 0x222222, new THREE.Vector3(0, 0.5, -20)); // Keyboard
        createObject(new THREE.CylinderGeometry(4, 3, 10), 0x440000, new THREE.Vector3(20, 5, -15)); // Mug

        // --- PARTICLES ---
        const particles = [];
        function createBlood(pos) {
            for(let i=0; i<10; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
                p.position.copy(pos);
                const vel = new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.2, (Math.random()-0.5)*0.2);
                scene.add(p);
                particles.push({ mesh: p, vel, life: 1 });
            }
        }

        // --- ZOMBIES ---
        const zombies = [];
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const mouthMat = new THREE.MeshBasicMaterial({ color: 0x330000 });

        function spawnZombie() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), new THREE.MeshStandardMaterial({ color: 0x123456 }));
            body.position.y = 0.75;
            group.add(body);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0x2d5a27 }));
            head.position.y = 1.8;
            group.add(head);

            // Face
            const eye1 = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.1), eyeMat);
            eye1.position.set(0.2, 0.1, 0.4);
            head.add(eye1);
            const eye2 = eye1.clone(); eye2.position.x = -0.2;
            head.add(eye2);

            group.position.set((Math.random()-0.5)*80, 0, (Math.random()-0.5)*80);
            scene.add(group);
            zombies.push({ mesh: group, hp: 50 + (wave*10), speed: 0.02 + (wave*0.005) });
        }

        // --- SHOOTING ---
        const raycaster = new THREE.Raycaster();
        function shoot() {
            const now = Date.now();
            const wp = weapons[currentWeapon];
            if (now - lastShootTime < wp.delay || wp.ammo <= 0) return;
            
            lastShootTime = now;
            wp.ammo--;
            updateHUD();

            const count = wp.multi || 1;
            for(let i=0; i<count; i++) {
                raycaster.setFromCamera({ x: (Math.random()-0.5)*wp.spread, y: (Math.random()-0.5)*wp.spread }, camera);
                const hits = raycaster.intersectObjects(zombies.map(z => z.mesh), true);
                if (hits.length > 0) {
                    const hitObj = hits[0].object;
                    const zombie = zombies.find(z => z.mesh === hitObj.parent || z.mesh === hitObj.parent?.parent);
                    if (zombie) {
                        zombie.hp -= wp.damage;
                        createBlood(hits[0].point);
                        if (zombie.hp <= 0) {
                            coins += 10;
                            updateHUD();
                            scene.remove(zombie.mesh);
                            zombies.splice(zombies.indexOf(zombie), 1);
                        }
                    }
                }
            }
            // Muzzle flash / Recoil effect
            camera.rotation.x += 0.05;
        }

        // --- UI HELPERS ---
        function updateHUD() {
            document.getElementById('coins').innerText = coins;
            document.getElementById('wave').innerText = wave;
            const wp = weapons[currentWeapon];
            document.getElementById('weaponName').innerText = wp.name;
            document.getElementById('ammo').innerText = wp.ammo;
            document.getElementById('reserve').innerText = wp.reserve === Infinity ? '∞' : wp.reserve;
        }

        window.buyWeapon = (type, cost) => {
            if (coins >= cost) {
                coins -= cost;
                currentWeapon = type;
                updateHUD();
            }
        };

        window.buyAmmo = () => {
            if (coins >= 20) {
                coins -= 20;
                weapons[currentWeapon].reserve += 60;
                updateHUD();
            }
        };

        window.toggleShop = () => {
            const shop = document.getElementById('shop');
            const open = shop.style.display === 'block';
            shop.style.display = open ? 'none' : 'block';
            if (!open) controls.unlock(); else controls.lock();
        };

        // --- CONTROLS ---
        document.addEventListener('mousedown', () => { if(controls.isLocked) shoot(); else controls.lock(); });
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'b') toggleShop();
            if (e.key.toLowerCase() === 'r') {
                const wp = weapons[currentWeapon];
                const need = wp.maxAmmo - wp.ammo;
                const canTake = Math.min(need, wp.reserve);
                wp.ammo += canTake;
                wp.reserve -= canTake;
                updateHUD();
            }
        });

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (controls.isLocked) {
                // Movement (simplified)
                // Zombies AI
                zombies.forEach(z => {
                    const dir = camera.position.clone().sub(z.mesh.position).normalize();
                    z.mesh.position.add(dir.multiplyScalar(z.speed));
                    z.mesh.lookAt(camera.position.x, 0, camera.position.z);
                    // Animation
                    z.mesh.position.y = Math.abs(Math.sin(time * 5)) * 0.2;
                });

                if (zombies.length < 5 + (wave*2)) spawnZombie();
            }

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.vel);
                p.vel.y -= 0.01;
                p.life -= 0.02;
                p.mesh.scale.setScalar(p.life);
                if(p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateHUD();
        animate();
    </script>
</body>
</html>
